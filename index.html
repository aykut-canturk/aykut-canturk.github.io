<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sayı Bahçesi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F0F7F4;
    --card:#FFFFFF;
    --ink:#1F4538;
    --ink-soft:#6B8E82;
    --leaf:#2E9E7C;
    --leaf-dark:#247E63;
    --sun:#FBBF24;
    --petal:#F2789F;
    --sky:#7CC4E6;
    --success:#2E9E7C;
    --tryagain:#F08A3C;
    --shadow:0 10px 30px rgba(31,69,56,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Nunito",system-ui,sans-serif;
    color:var(--ink);
    background:var(--bg);
    background-image:
      radial-gradient(circle at 85% -5%, rgba(251,191,36,.28), transparent 38%),
      radial-gradient(circle at 8% 105%, rgba(124,196,230,.22), transparent 42%);
    min-height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
  }

  /* ---- Header ---- */
  header{
    width:100%;max-width:640px;
    display:flex;align-items:center;justify-content:space-between;
    gap:16px;margin:8px 0 4px;
  }
  .brand{display:flex;align-items:center;gap:10px}
  .brand .logo{font-size:30px;line-height:1}
  .brand h1{
    font-family:"Fredoka",sans-serif;font-weight:600;
    font-size:1.5rem;letter-spacing:.3px;
  }
  .garden{display:flex;gap:6px}
  .garden .slot{
    width:30px;height:30px;border-radius:50%;
    display:grid;place-items:center;font-size:20px;
    background:#E1EEE8;transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  }
  .garden .slot.bloom{
    background:#FFF3D6;transform:scale(1);
    animation:pop .5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop{0%{transform:scale(.3)}100%{transform:scale(1)}}

  /* ---- Card ---- */
  main{
    width:100%;max-width:640px;
    background:var(--card);
    border-radius:32px;
    box-shadow:var(--shadow);
    padding:40px 32px 36px;
    margin-top:18px;
    text-align:center;
  }
  .eyebrow{
    font-weight:800;text-transform:uppercase;letter-spacing:2px;
    font-size:.8rem;color:var(--ink-soft);
  }

  .question{
    font-family:"Fredoka",sans-serif;font-weight:600;
    font-size:clamp(3rem,14vw,5rem);
    line-height:1.1;margin:14px 0 6px;
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    gap:.2em;flex-wrap:wrap;
  }
  .question .op{color:var(--leaf)}
  .question .eq{color:var(--ink-soft)}
  .question .q{color:var(--petal)}

  .listen{
    border:none;cursor:pointer;
    background:#EAF4F0;color:var(--leaf-dark);
    font-family:"Nunito";font-weight:800;font-size:1rem;
    padding:10px 18px;border-radius:999px;
    display:inline-flex;align-items:center;gap:8px;
    transition:background .15s, transform .1s;
  }
  .listen:hover{background:#DCEDE6}
  .listen:active{transform:scale(.96)}

  /* ---- Answers ---- */
  .answers{
    display:grid;grid-template-columns:repeat(3,1fr);
    gap:16px;margin:30px 0 8px;
  }
  .answer{
    font-family:"Fredoka",sans-serif;font-weight:600;
    font-size:clamp(2rem,9vw,3rem);
    padding:24px 0;border-radius:24px;
    border:3px solid #E1EEE8;background:#F7FBF9;
    color:var(--ink);cursor:pointer;
    transition:transform .12s, background .2s, border-color .2s, color .2s;
    -webkit-tap-highlight-color:transparent;
  }
  .answer:hover{border-color:var(--leaf);transform:translateY(-3px)}
  .answer:active{transform:translateY(0) scale(.97)}
  .answer:focus-visible{outline:4px solid var(--sky);outline-offset:3px}
  .answer.correct{
    background:var(--success);border-color:var(--success);color:#fff;
    animation:pop .45s cubic-bezier(.34,1.56,.64,1);
  }
  .answer.wrong{
    background:#FFF1E6;border-color:var(--tryagain);color:var(--tryagain);
    animation:shake .4s;
  }
  @keyframes shake{
    0%,100%{transform:translateX(0)}
    20%,60%{transform:translateX(-7px)}
    40%,80%{transform:translateX(7px)}
  }

  /* ---- Feedback ---- */
  .feedback{
    min-height:44px;margin-top:18px;
    font-family:"Fredoka",sans-serif;font-weight:500;
    font-size:1.5rem;
    display:flex;align-items:center;justify-content:center;gap:8px;
    opacity:0;transform:translateY(6px);transition:opacity .25s, transform .25s;
  }
  .feedback.show{opacity:1;transform:translateY(0)}
  .feedback.good{color:var(--success)}
  .feedback.retry{color:var(--tryagain)}

  .banner{
    margin-top:16px;background:#FFF3D6;color:#9A6B00;
    border-radius:18px;padding:14px;font-weight:800;font-size:1.1rem;
    display:none;
  }
  .banner.show{display:block;animation:pop .5s cubic-bezier(.34,1.56,.64,1)}

  footer{
    margin:22px 0 6px;color:var(--ink-soft);
    font-weight:700;font-size:.95rem;
  }
  footer b{color:var(--leaf-dark)}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important}
  }
  @media (max-width:420px){
    main{padding:30px 18px 26px;border-radius:26px}
    .answers{gap:12px}
  }
</style>
</head>
<body>

  <header>
    <div class="brand">
      <span class="logo" aria-hidden="true">🌼</span>
      <h1>Sayı Bahçesi</h1>
    </div>
    <div class="garden" id="garden" aria-label="Topladığın çiçekler"></div>
  </header>

  <main>
    <p class="eyebrow" id="eyebrow">1. Soru</p>

    <div class="question" id="question" aria-live="polite"></div>

    <button class="listen" id="listenBtn" type="button">
      <span aria-hidden="true">🔊</span> Dinle
    </button>

    <div class="answers" id="answers" role="group" aria-label="Cevap seçenekleri"></div>

    <div class="feedback" id="feedback" aria-live="assertive"></div>

    <div class="banner" id="banner">🌷 Bahçen çiçeklerle doldu! Harikasın!</div>
  </main>

  <footer>Doğru: <b id="score">0</b></footer>

<script>
(function(){
  const GARDEN_SIZE = 5;
  const FLOWERS = ["🌸","🌷","🌻","🌼","🏵️"];

  let current = null;   // {a, b, op, answer, options}
  let qIndex = 0;
  let score = 0;
  let bloom = 0;
  let locked = false;

  const $ = id => document.getElementById(id);
  const gardenEl  = $("garden");
  const eyebrowEl = $("eyebrow");
  const questionEl= $("question");
  const answersEl = $("answers");
  const feedbackEl= $("feedback");
  const bannerEl  = $("banner");
  const scoreEl   = $("score");

  // Build the flower progress slots
  for(let i=0;i<GARDEN_SIZE;i++){
    const s = document.createElement("span");
    s.className = "slot";
    s.textContent = "·";
    gardenEl.appendChild(s);
  }
  const slots = [...gardenEl.children];

  const rand = (min,max)=> Math.floor(Math.random()*(max-min+1))+min;

  function newQuestion(){
    const op = Math.random() < 0.5 ? "+" : "−";
    let a,b,answer;
    if(op === "+"){
      answer = rand(2,10);
      a = rand(1, answer-1);
      b = answer - a;
    } else {
      a = rand(2,10);
      b = rand(1, a);
      answer = a - b;
    }
    // three distinct, non-negative options
    const opts = new Set([answer]);
    while(opts.size < 3){
      let d = answer + rand(-3,3);
      if(d >= 0 && d !== answer) opts.add(d);
    }
    const options = [...opts].sort(()=> Math.random()-0.5);
    current = {a,b,op,answer,options};
    render();
  }

  function render(){
    locked = false;
    qIndex++;
    eyebrowEl.textContent = qIndex + ". Soru";
    questionEl.innerHTML =
      `<span>${current.a}</span>` +
      `<span class="op">${current.op}</span>` +
      `<span>${current.b}</span>` +
      `<span class="eq">=</span>` +
      `<span class="q">?</span>`;

    answersEl.innerHTML = "";
    current.options.forEach(val=>{
      const btn = document.createElement("button");
      btn.className = "answer";
      btn.type = "button";
      btn.textContent = val;
      btn.addEventListener("click", ()=> choose(btn, val));
      answersEl.appendChild(btn);
    });

    feedbackEl.className = "feedback";
    feedbackEl.textContent = "";
  }

  function choose(btn, val){
    if(locked) return;
    if(val === current.answer){
      locked = true;
      btn.classList.add("correct");
      feedbackEl.textContent = "Harika! 🎉";
      feedbackEl.className = "feedback show good";
      score++; scoreEl.textContent = score;
      growFlower();
      setTimeout(newQuestion, 1300);
    } else {
      btn.classList.add("wrong");
      feedbackEl.textContent = "Tekrar dene 💪";
      feedbackEl.className = "feedback show retry";
      btn.disabled = true;
      setTimeout(()=> btn.classList.remove("wrong"), 450);
    }
  }

  function growFlower(){
    const slot = slots[bloom];
    slot.textContent = FLOWERS[bloom % FLOWERS.length];
    slot.classList.add("bloom");
    bloom++;
    if(bloom >= GARDEN_SIZE){
      bannerEl.classList.add("show");
      setTimeout(()=>{
        bannerEl.classList.remove("show");
        bloom = 0;
        slots.forEach(s=>{ s.textContent="·"; s.classList.remove("bloom"); });
      }, 2200);
    }
  }

  // Read the question aloud (Turkish), with graceful fallback
  $("listenBtn").addEventListener("click", ()=>{
    if(!("speechSynthesis" in window) || !current) return;
    const opWord = current.op === "+" ? "artı" : "eksi";
    const text = `${current.a} ${opWord} ${current.b} kaç eder?`;
    try{
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "tr-TR";
      u.rate = 0.85;
      window.speechSynthesis.speak(u);
    }catch(e){/* sessizce geç */}
  });

  newQuestion();
})();
</script>
</body>
</html>
